<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gull Translate | Voice to Finnish/English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container fade-in">
        <div class="glass-card">
            <header class="header">
                <h1>Musa Translate</h1>
                <p>Professional Voice Translation Hub</p>
            </header>

            <div class="controls-grid">
                <select id="src-lang" class="lang-select">
                    <option value="en-US">English</option>
                    <option value="ur-PK">Urdu</option>
                    <option value="de-DE">German</option>
                    <option value="zh-CN">Chinese</option>
                </select>
                <button class="swap-btn" id="swap-langs">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z" />
                    </svg>
                </button>
                <select id="target-lang" class="lang-select">
                    <option value="ur">Urdu</option>
                    <option value="en">English</option>
                    <option value="de">German</option>
                    <option value="zh">Chinese</option>
                </select>
                <div class="voice-opt">
                    <label style="font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox" id="voice-output-toggle" checked> Auto-Speak
                    </label>
                </div>
            </div>

            <div class="video-container">
                <div class="hardware-badge">GULL IMRAN鴎</div>
                <video id="webcam-feed" autoplay playsinline muted></video>
                <div class="subtitle-overlay">
                    <div id="live-subtitle">Your translation will appear here live...</div>
                </div>
            </div>

            <div class="io-section">
                <div class="input-box">
                    <span class="label">Listening</span>
                    <div id="input-text" class="text-content placeholder">Speak something...</div>
                </div>

                <div class="output-box">
                    <span class="label">Translated</span>
                    <div id="output-text" class="text-content placeholder">Translation will appear here</div>
                </div>
            </div>

            <div class="mic-container">
                <button id="mic-btn" class="mic-btn" title="Start Listening">
                    <svg class="mic-icon" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                        <path
                            d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                    </svg>
                </button>
            </div>

            <div id="status" class="status-indicator">Click the microphone to start</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
