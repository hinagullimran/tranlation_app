<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gull Translate | Voice to Finnish/English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container fade-in">
        <div class="glass-card">
            <header class="header">
                <h1>Gull Translate</h1>
                <p>Instant voice translation for Finnish & English</p>
            </header>

            <div class="mode-selector">
                <span id="label-en" class="lang-label active">ENGLISH</span>
                <label class="switch">
                    <input type="checkbox" id="mode-toggle">
                    <span class="slider"></span>
                </label>
                <span id="label-fi" class="lang-label">FINNISH</span>
            </div>

            <div class="io-section">
                <div class="input-box">
                    <span class="label">Listening</span>
                    <div id="input-text" class="text-content placeholder">Speak something...</div>
                </div>

                <div class="output-box">
                    <span class="label">Translated</span>
                    <div id="output-text" class="text-content placeholder">Translation will appear here</div>
                </div>
            </div>

            <div class="mic-container">
                <button id="mic-btn" class="mic-btn" title="Start Listening">
                    <svg class="mic-icon" viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>

            <div id="status" class="status-indicator">Click the microphone to start</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
